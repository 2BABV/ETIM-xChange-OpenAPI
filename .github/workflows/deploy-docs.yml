name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Bundle API specs
        run: npm run bundle

      - name: Build API documentation
        run: npm run build:docs

      - name: Assemble site
        run: |
          mkdir -p _site/product/latest _site/tradeitem/latest

          cp openapi/apis/product/generated/product.html       _site/product/latest/
          cp openapi/apis/product/generated/product-api.yaml   _site/product/latest/
          cp openapi/apis/tradeitem/generated/tradeitem.html      _site/tradeitem/latest/
          cp openapi/apis/tradeitem/generated/tradeitem-api.yaml  _site/tradeitem/latest/

          cp index.html   _site/
          cp .nojekyll    _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
