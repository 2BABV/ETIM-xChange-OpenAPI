name: Release API

on:
  push:
    tags:
      - 'product/v*'
      - 'tradeitem/v*'

permissions:
  contents: write  # create GitHub Releases and push to gh-pages branch
  actions: write   # trigger deploy-docs workflow via workflow_dispatch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract API name and version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          API_NAME="${TAG%/v*}"
          VERSION="${TAG#*/v}"
          echo "api_name=$API_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"

      - name: Set API display name
        id: display
        run: |
          if [ "${{ steps.extract.outputs.api_name }}" == "product" ]; then
            echo "name=Product" >> "$GITHUB_OUTPUT"
          else
            echo "name=Trade Item" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version matches spec
        run: |
          SPEC_VERSION=$(yq eval '.info.version' "openapi/apis/${{ steps.extract.outputs.api_name }}/openapi.yaml")
          TAG_VERSION="${{ steps.extract.outputs.version }}"
          if [ "$SPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match spec version ($SPEC_VERSION). Update info.version in openapi.yaml before tagging."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Bundle API spec
        run: npm run "bundle:${{ steps.extract.outputs.api_name }}"

      - name: Build HTML docs
        run: npm run "build:${{ steps.extract.outputs.api_name }}"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          API_NAME="${{ steps.extract.outputs.api_name }}"
          CHANGELOG="openapi/apis/$API_NAME/CHANGELOG.md"
          if ! grep -q "^## \[$VERSION\]" "$CHANGELOG"; then
            echo "::error::Version $VERSION not found in $CHANGELOG. Add a CHANGELOG entry before tagging."
            exit 1
          fi
          awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" "$CHANGELOG" > release-notes.md

      - name: Create GitHub Release
        run: |
          API="${{ steps.extract.outputs.api_name }}"
          VER="${{ steps.extract.outputs.version }}"
          TAG="${{ steps.extract.outputs.tag }}"
          PRERELEASE_FLAG=""
          if echo "$VER" | grep -q '-'; then PRERELEASE_FLAG="--prerelease"; fi
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "${{ steps.display.outputs.name }} API v$VER" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            "openapi/apis/$API/generated/$API-api.yaml" \
            "openapi/apis/$API/generated/$API.html"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Push versioned docs to gh-pages branch
        run: |
          API="${{ steps.extract.outputs.api_name }}"
          VER="v${{ steps.extract.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Generated files are gitignored — they survive git branch switches
          YAML_SRC="openapi/apis/$API/generated/$API-api.yaml"
          HTML_SRC="openapi/apis/$API/generated/$API.html"

          git fetch origin gh-pages 2>/dev/null || true
          if git ls-remote --exit-code origin gh-pages 2>/dev/null; then
            git checkout -b gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf --cached . 2>/dev/null || true
            git clean -fd
          fi

          mkdir -p "$API/$VER"
          cp "$YAML_SRC" "$API/$VER/"
          cp "$HTML_SRC" "$API/$VER/"

          node -e '
            const fs = require("fs");
            const p = "versions.json";
            const api = process.env.API_NAME;
            const ver = process.env.VERSION;
            const date = new Date().toISOString().slice(0, 10);
            const pre = ver.includes("-");
            let data = { product: { latest: "", versions: [] }, tradeitem: { latest: "", versions: [] } };
            try { data = JSON.parse(fs.readFileSync(p, "utf8")); } catch(e) {}
            if (!data[api]) data[api] = { latest: "", versions: [] };
            data[api].versions = [{ version: ver, date: date, prerelease: pre }, ...data[api].versions.filter(v => v.version !== ver)];
            data[api].latest = (data[api].versions.find(v => !v.prerelease) || data[api].versions[0]).version;
            fs.writeFileSync(p, JSON.stringify(data, null, 2));
            console.log("Updated versions.json for " + api + ": latest=" + data[api].latest);
          '
          git add .
          git diff --cached --quiet || git commit -m "release: $API $VER versioned docs"
          git push origin gh-pages
          git checkout -
        env:
          API_NAME: ${{ steps.extract.outputs.api_name }}
          VERSION:  ${{ steps.extract.outputs.version }}

      - name: Trigger Pages deployment
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-docs.yml/dispatches" \
            -d '{"ref":"main"}'
