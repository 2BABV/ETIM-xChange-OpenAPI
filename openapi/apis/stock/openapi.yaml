openapi: 3.1.0
info:
  title: Stock API
  version: 1.0.0
  description: |
    API for retrieving stock availability and quantity information for trade items.
    
    This API provides real-time stock information including available quantity and availability status.
  contact:
    name: 2BA API Support
    email: api-support@2ba.nl
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://rest.2ba.nl/v1/stock
    description: Production server
  - url: https://rest.accept.2ba.nl/v1/stock
    description: Acceptance server
tags:
  - name: Stock
    description: Stock availability and quantity operations
paths:
  /{supplierIdGln}/{supplierItemNumber}:
    $ref: paths/stock.yaml
security:
  - oauth2:
      - read:stock
components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: |
        OAuth 2.0 Client Credentials grant (RFC 6749 §4.4).
        Supports both client_secret and client_assertion (RFC 7523) authentication.
      flows:
        clientCredentials:
          tokenUrl: https://identity.2ba.nl/connect/token
          scopes:
            read:stock: Grants read access to stock information
